# === v6 verified-repo suite roster (count + roles; quick reference) ===========
# DETECTION comparators (AUROC) — must_beat:
#   1 redeep_detector              ReDeEP            ICLR 2025
#   2 reasoning_consistency_detector RACE            AAAI 2026
#   3 lapeigvals_detector          LapEigvals        EMNLP 2025
#   4 haloscope_detector           HaloScope         NeurIPS 2024 (spotlight)
#   5 lookback_lens_detector       Lookback-Lens     EMNLP 2024
#   6 mind_detector                MIND              ACL 2024 (Findings)
#   7 inside_detector              INSIDE/EigenScore ICLR 2024
#   8 semantic_entropy             Semantic Entropy  Nature 2024 / ICLR 2023
#   9 selfcheckgpt                 SelfCheckGPT      EMNLP 2023
# LOCALIZATION / attribution comparators (necessity-cert competes most directly) — control:
#  10 captum_integrated_gradients  Captum IG         attribution control
#  11 causal_mediation_analysis    Causal Mediation  NeurIPS 2020
# => 9 DETECTION (must_beat) + 2 LOCALIZATION (control) = 11 verified-repo baselines,
#    clearing the >=8 OFFICIAL-REPO contract (REDESIGN_v6 §3). Plus the local sanity
#    baselines (random_segment, output_entropy) and the diffusion-transfer-only
#    detectors (tdgnet) that are NOT part of the AR-lead verified-repo suite.
# CITED REFERENCE, NOT REPRODUCED: TraceDet (diffusion_trace_detector above) —
#    role: cited_reference_not_reproduced (no public code + complex diffusion method);
#    differentiated-from, not reproduced. Its IB selection criterion re-cast as the
#    B1 AR span adapter is OUR code (repair_ops.tracedet_ar_span_adapter), distinct.
