  diffusion_trace_detector:
    display_name: TraceDet
    family: diffusion_trace
    required: true
    paper_url: https://arxiv.org/abs/2510.01274
    venue: ICLR 2026
    official_repo: none_public          # no public code release as of v6 lock
    implementation_source: cited_reference_not_reproduced
    implementation_commit: not_applicable_cited_reference
    license: not_applicable_cited_reference
    role: cited_reference_not_reproduced
    comparator_class: cited_reference   # not a reproduced detector OR localizer in v6
    tuning_grid: not_applicable_cited_reference
    input_access: diffusion_denoising_trace
    fairness: not_reproduced_so_no_matched_comparison
    segment_adaptation: not_reproduced   # the DIFFUSION DETECTOR is not run; see ar_span_adapter_role below
    paradigm_scope: diffusion_transfer_only
    # === v6 ROLE CHANGE: TraceDet = CITED REFERENCE, NOT REPRODUCED ============
    # The TraceDet DIFFUSION DETECTOR (denoising-trace IB classifier) is NOT
    # reproduced as a baseline in v6. Reason (REDESIGN_v6 §3.4; ARIS v6 decision):
    # (1) no public official code is released for TraceDet, and (2) it is a complex
    # diffusion-LLM method on a different paradigm from our frozen AR-LLM lead.
    # Reproducing it faithfully would require a from-scratch diffusion re-implementation
    # (a faithful-reimplementation, which the v6 verified-repo contract explicitly
    # bars from the headline >=8 OFFICIAL-REPO suite). We therefore DIFFERENTIATE
    # from TraceDet in related work rather than reproduce it: it remains the SHARPEST
    # related-work neighbour we cite + position against (the "causal beats
    # correlational" rebuttal we must cash in empirically vs the REPRODUCED suite),
    # NOT a reproduced baseline. It is absent from BOTH the AR-lead R_hat table AND
    # the diffusion transfer table as a run detector.
    #
    # SEPARATELY AND DISTINCT: a TraceDet-DERIVED AR span-selection ADAPTER (its IB
    # sub-trace selection CRITERION re-cast onto AR-LLM traces, refinement 3) DOES
    # enter the AR-lead REPAIR PANEL as B1. This is OUR training-free re-cast of a
    # published selection criterion onto AR spans (no diffusion code, no TraceDet
    # weights), run through the identical repair_ops pipeline for G9-NOV fairness.
    # The detector is cited-not-reproduced; the adapter is our own span selector.
    detector_ar_lead_inclusion: excluded_from_ar_lead_table
    detector_diffusion_transfer_inclusion: cited_not_reproduced_absent_from_transfer_table
    ar_span_adapter_role: B1_in_ar_lead_repair_panel   # repair_ops.tracedet_ar_span_adapter (refinement 3)
    ar_span_adapter_selector: tracecausal.repair_ops.tracedet_ar_span_adapter
    ar_span_adapter_is_reproduced: true   # OUR re-cast span selector (not TraceDet code)
    cited_reference_justification: >-
      TraceDet (ICLR 2026, arXiv 2510.01274) has NO public official code and is a
      complex diffusion-LLM method on a paradigm distinct from our frozen AR-LLM
      lead (Qwen2.5-7B-Instruct + Llama-3.1-8B-Instruct). Per the v6 verified-repo
      contract (REDESIGN_v6 §3), the headline baseline suite admits only confirmed
      OFFICIAL-REPO methods; a from-scratch diffusion re-implementation is barred
      from that suite. TraceDet is therefore CITED and POSITIONED AGAINST as the
      sharpest related-work neighbour (paper Sec. Related), NOT reproduced as a
      detector baseline. What enters the AR-lead repair panel is NOT the diffusion
      detector but a TraceDet-DERIVED AR span-selection adapter (B1): its
      information-bottleneck sub-trace selection criterion re-cast as a training-free
      AR localization selector and fed through the identical repair_ops pipeline
      (our own code, no diffusion weights). The detector is cited-not-reproduced;
      the B1 adapter is our re-cast span selector. Pre-registered; pin revision at
      run authorization.
  tdgnet_trace_detector:
    display_name: TDGNet
    family: diffusion_trace
    required: true
    paper_url: https://arxiv.org/abs/2602.08048
    implementation_source: official_or_faithful_reimplementation_required
