project: tracecausal
# Baseline boundary (phase2b review item 6): every comparator below is INCLUDED as
# an adapted segment-level baseline OR carries an explicit exclusion justification.
# The defended claim is segment-level intervention-usefulness, so each output/trace
# detector is ADAPTED to score trace SEGMENTS (re-scored on U_hat, ciu_scored=true
# in the experiment config) rather than compared in its native output-level form.
# Each adapted baseline carries a `segment_adaptation:` field stating how its native
# signal is mapped to a per-segment score. Pre-registered; pin exact revision/hash
# at run authorization.
#
# === v6 VERIFIED-REPO BASELINE CONTRACT (REDESIGN_v6 §3; ARIS v6) ============
# The v6 redesign promotes Qwen2.5-7B-Instruct (+ Llama-3.1-8B-Instruct secondary)
# as the matched headline model and LOCKS a >=8 OFFICIAL-REPO baseline suite
# (2024-2026, all confirmed real official code) for a top-conference fair
# comparison. Each verified-repo baseline carries `implementation_source:
# official_repo`, an `official_repo:` URL, `venue:`, and a `role:` field. The
# fairness contract (BASELINES.md "Fairness protocol"): every detector's NATIVE
# signal is re-scored to a segment-level Û (`segment_adaptation:`) AND run through
# the IDENTICAL repair pipeline (repair_ops) for G9-NOV, on the SAME matched model
# (Qwen2.5-7B-Instruct), SAME datasets (TriviaQA/HotpotQA), SAME evaluator and
# splits. Deciding gates: G1 (necessity, screening) + G9-NOV (repair-transfer).
#
# DETECTION vs LOCALIZATION distinction (v6, `comparator_class:` field):
#   - `comparator_class: detection`    -> scored by AUROC/AUPRC/FPR@95TPR; these
#       are output-/representation-/sampling-level hallucination detectors adapted
#       to segment-level Û. They populate the screening (G1/G5') + detection tables.
#   - `comparator_class: localization` -> token-attribution / mediation comparators
#       (Captum Integrated Gradients, Causal Mediation Analysis). These produce a
#       per-token/per-component importance map, NOT a detector score; our necessity
#       certification competes with them MOST DIRECTLY (they are the closest
#       attribution-localization neighbours). Scored on the segment-localization
#       margin (G1 necessity / G6/G7 leakage), not AUROC.
# `implementation_source: official_repo` requires the exact upstream commit be
# pinned at run authorization (`implementation_commit: pending_before_server_run`)
# and the license verified before any citation/run.
segment_adaptation_policy: all_output_and_trace_detectors_rescored_to_segment_level_u_hat
